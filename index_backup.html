<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Movies and Browser</title>
    <script>
      window.onload = function () {
        var url =
          "D:\\Electron app projects\\merge-localmovies-browser\\localmovies.html";
        document.getElementById("url-bar").value = url;
        document.querySelector(".tab-content-frame").src = url;
        document.querySelector(".tab.active").setAttribute("data-url", url);
        if (window.electron && typeof window.electron.invoke === "function") {
          window.electron
            .invoke("get-app-version")
            .then((version) => {
              document.title = `Movies and Browser v${version}`;
            })
            .catch((err) => {
              console.warn("Failed to read app version:", err);
            });
        }
      };
    </script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/fontawesome.min.css"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div id="browser">
      <div
        id="toolbar"
        style="
          display: flex;
          flex-direction: row;
          justify-content: space-between;
        "
      >
        <div class="tabs">
          <div
            class="tab active"
            id="1"
            data-tab-id="1"
            data-url="D:\\Electron app projects\\merge-localmovies-browser\\localmovies.html"
          >
            Home <button class="close-tab">&times;</button>
          </div>
          <div id="add-tab">&#43;</div>
        </div>
        <div>
          <span class="btn" title="Local Movies" id="show-local-movies"
            ><i class="fas fa-video"></i
          ></span>
          <span class="btn" title="Interact with Webview" id="interact-webview"
            >Auto</span
          >
          <span class="btn" title="Show Downloads" id="show-downloads"
            ><i class="fas fa-download"></i
          ></span>

          <span class="btn" title="Reset App" id="reset-app"
            ><i class="fas fa-home"></i
          ></span>
          <span class="btn" title="Show Database" id="show-database"
            ><i class="fas fa-hamburger"></i
          ></span>
          <span class="btn" title="Show Vault" id="show-vault">
            <i class="fa-solid fa-vault"></i>
          </span>
          <!-- Theme toggle -->
          <div class="controls">
            <div class="toggle">
              <div
                id="myToggle"
                class="switch"
                role="switch"
                aria-checked="false"
                tabindex="0"
              >
                <div class="knob" id="knob"></div>
                <input type="checkbox" id="toggleInput" aria-hidden="true" />
              </div>
            </div>
          </div>
        </div>
      </div>
      <form id="url-form">
        <input type="text" id="url-bar" placeholder="Enter URL here" />
      </form>
      <webview
        preload="preload.cjs"
        tabindex="1"
        class="tab-content-frame active"
        id="frame-1"
        src="D:\\Electron app projects\\merge-localmovies-browser\\localmovies.html"
      ></webview>
      <script src="index.js"></script>

      <!-- Modal for download progress -->
      <div id="download-modal" class="modal">
        <div class="modal-content">
          <span class="close">&times;</span>
          <h2>Download Progress</h2>
          <ul id="download-list"></ul>
        </div>
      </div>
    </div>
    <script src="downloads.cjs"></script>
  </body>
</html>
