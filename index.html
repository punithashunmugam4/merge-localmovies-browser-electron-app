<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Movies and Browser</title>
    <script>
      window.onload = function () {
        var url =
          "D:\\Electron app projects\\merge-localmovies-browser\\localmovies.html";
        document.querySelector(".address-bar").value = url;
        document.querySelector(".tab-content-frame").src = url;
        document.querySelector(".tab.active").setAttribute("data-url", url);
        if (window.electron && typeof window.electron.invoke === "function") {
          window.electron
            .invoke("get-app-version")
            .then((version) => {
              document.title = `Movies and Browser v${version}`;
               document.querySelector(".title-text").textContent =
                `Movies and Browser v${version}`;
            })
            .catch((err) => {
              console.warn("Failed to read app version:", err);
            });
        }
      };
    </script>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
     <header class="browser-header">
      <div class="header-top-row">
        <div class="app-title">
          <span class="material-symbols-outlined title-icon">explore</span>
          <span class="title-text">Movies & Browser</span>
        </div>

        <div class="window-controls">
          <button class="control-btn" id="min-btn">
            <span class="material-symbols-outlined">minimize</span>
          </button>
          <button class="control-btn" id="max-btn" data-state="maximized">
            <span class="material-symbols-outlined max-icon">flip_to_front</span>
            <span class="material-symbols-outlined restore-icon"
              >crop_square</span
            >
          </button>
          <button class="control-btn close-btn" id="close-btn">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
      </div>
      <div class="header-bottom-row">
        <div class="tab-bar">
          <div
            class="tab active"
            id="1"
            data-tab-id="1"
            data-url=""
          >
            <span class="tab-title">Home</span>
            <button class="close-tab-btn">
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>
          <button class="add-tab-btn">
            <span class="material-symbols-outlined">add</span>
          </button>
        </div>
      </div>
    </header>
    <nav class="nav-bar">
      <div class="nav-buttons">
        <button class="nav-btn" id="back-btn">
          <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <button class="nav-btn" id="forward-btn">
          <span class="material-symbols-outlined">arrow_forward</span>
        </button>
        <button class="nav-btn" id="refresh-btn">
          <span class="material-symbols-outlined">refresh</span>
        </button>
      </div>
      <div class="address-bar-wrapper">
        <span class="material-symbols-outlined lock-icon">lock</span>
        <input
          type="text"
          class="address-bar"
          value=""
          placeholder="Search Google or type a URL"
        />
      </div>
      <div class="nav-buttons">
        <button id="show-local-movies" title="Local Movies"  class="nav-btn">
          <span class="material-symbols-outlined">videocam</span></button>
         <button id="show-vault" title="Vault" class="nav-btn">
          <span class="material-symbols-outlined">privacy</span></button>
          <button id="show-database" title="Database" class="nav-btn">
          <span class="material-symbols-outlined">storage</span></button>
          <button id="interact-webview" title="Interact with Webview" class="nav-btn">
          <span class="material-symbols-outlined">smart_toy</span></button>
        <button class="nav-btn" title="Downloads" id="show-downloads">
          <span class="material-symbols-outlined">download</span>
        </button>
        <button id="theme-toggle" title="Theme" class="nav-btn">
          <span class="material-symbols-outlined">dark_mode</span>
        </button>
        <button class="nav-btn" title="Reset App" id="reset-app">
          <span class="material-symbols-outlined">home</span></button>
          <button id="bookmark" title="Bookmarks" class="nav-btn">
          <span class="material-symbols-outlined">bookmark</span>
        </button>
        </div>
    </nav>
        <div class="inner-container">
      <main class="content-container">
      <div class="web-view-wrapper active">
        <webview
          preload="preload.cjs"
          tabindex="1"
          class="tab-content-frame active"
          id="frame-1"
          src=""
        ></webview>
      </div>
    </main>
      <script type="module" src="index.js"></script>

      <!-- Modal for download progress -->
      <div id="download-modal" class="modal">
        <div class="modal-content">
          <span class="close-modal">&times;</span>
          <h2>Download Progress</h2>
          <ul id="download-list"></ul>
        </div>
      </div>
        <script src="downloads.cjs"></script>

  <aside class="bookmark-frame hide">
      
      <div class="frame-header">
        <h2>Bookmarks</h2>
        <button class="bm-add-btn" title="Add New Bookmark">
          <span class="icon material-symbols-outlined">add</span>
      </div>
      
      <div class="bookmark-list">
        
        <div class="bookmark-item">
          <img class="bookmark-graphic" src="https://www.google.com/s2/favicons?sz=64&domain=github.com" alt="GitHub">
          <div class="bookmark-info">
            <span class="bookmark-title">GitHub Repository</span>
            <span class="bookmark-url">github.com</span>
          </div>
          <button class="bm-del-btn">
              <span class="material-symbols-outlined">close</span>
            </button>
        </div>

      </div>
    </aside>
  </div>
  </body>
</html>
