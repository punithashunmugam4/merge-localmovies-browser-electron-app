<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blank</title>
    <style>
      :root {
        /* Dark theme variables */
        --bg: rgba(26, 26, 26, 0.78);
        --text-color: #ffffff;
        --input-bg: rgba(45, 45, 45, 0.96);
        --input-border: rgba(255, 255, 255, 0.16);
        --input-focus-border: rgba(37, 99, 235, 0.45);
        --input-focus-bg: #2d2d2d;
        --placeholder-color: rgba(255, 255, 255, 0.45);
        --btn-bg: #2563eb;
        --btn-hover: #1d4ed8;
        --btn-shadow: rgba(37, 99, 235, 0.18);
        color-scheme: dark;
      }

      body.light-theme {
        /* Light theme variables */
        --bg: rgba(255, 255, 255, 0.78);
        --text-color: #1a1a1a;
        --input-bg: rgba(248, 250, 252, 0.96);
        --input-border: rgba(46, 60, 81, 0.16);
        --input-focus-border: rgba(56, 84, 255, 0.45);
        --input-focus-bg: #ffffff;
        --placeholder-color: rgba(26, 26, 26, 0.45);
        --btn-bg: #3854ff;
        --btn-hover: #253ed8;
        --btn-shadow: rgba(56, 84, 255, 0.18);
        color-scheme: light;
      }

      body {
        margin: 0;
        /* height: 100%; */
        background: var(--bg);
        backdrop-filter: blur(16px);
        padding: 20px;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        color: var(--text-color);
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
      }

      .blank-input-group {
        width: min(90vw, 640px);
        padding: 24px;
      }
      .blank-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        /* background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(29, 33, 41, 0.08);
        border-radius: 20px;
        box-shadow: 0 24px 60px rgba(55, 65, 78, 0.12); */
      }
      button.search-btn {
        margin-top: 16px;
        padding: 12px 24px;
        font-size: 1rem;
        border: none;
        border-radius: 12px;
        background: var(--btn-bg);
        color: #ffffff;
        box-shadow: 0 12px 24px var(--btn-shadow);
        cursor: pointer;
        transition:
          transform 0.2s ease,
          background 0.2s ease;
      }
      button.search-btn:hover {
        background: var(--btn-hover);
        transform: translateY(-1px);
      }

      .blank-title {
        margin: 0 0 16px;
        font-size: 1.2rem;
        letter-spacing: 0.02em;
      }

      .url-bar {
        width: 100%;
        max-width: 100%;
        padding: 14px 16px;
        font-size: 1rem;
        border: 1px solid var(--input-border);
        border-radius: 12px;
        outline: none;
        background: var(--input-bg);
        color: var(--text-color);
        transition:
          border-color 0.2s ease,
          background-color 0.2s ease;
      }

      .url-bar::placeholder {
        color: var(--placeholder-color);
      }
      .url-bar:focus {
        border-color: var(--input-focus-border);
        background: var(--input-focus-bg);
      }
    </style>
  </head>
  <body>
    <div class="blank-container">
      <div class="blank-input-group">
        <input
          class="url-bar"
          type="text"
          placeholder="Enter your URL here..."
          aria-label="URL bar"
        />
      </div>
      <button class="search-btn">Search</button>
    </div>
    <script>
      const urlBar = document.querySelector(".url-bar");
      urlBar.focus();
      function search() {
        const url = urlBar.value.trim();
        if (url && (url.includes("http") || url.includes("html"))) {
          window.location.href = url;
        } else {
          // Make a Google search for the query
          const searchURL = `https://www.google.com/search?q=${encodeURIComponent(url)}`;
          window.location.href = searchURL;
        }
      }
      urlBar.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          search();
        }
      });
      document.querySelector(".search-btn").addEventListener("click", search);
    </script>
  </body>
</html>
